<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jason Benjamin | EdTech Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            colors: {
              alpine: {
                950: '#0a0c10',
                900: '#12151c',
                800: '#1e222d',
                50: '#f8fafc'
              }
            }
          },
        },
      }
    </script>
    <style>
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }
        body {
            font-family: var(--font-sans);
            background-color: #0a0c10;
            color: #f8fafc;
            overflow-x: hidden;
            min-height: 100vh;
        }
        h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0c10; }
        ::-webkit-scrollbar-thumb { background: #1e222d; border-radius: 10px; }

        .parallax-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120%;
            z-index: -2;
            background-image: linear-gradient(to bottom, rgba(10, 12, 16, 0.4), rgba(10, 12, 16, 0.9)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2560&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            transform: translateY(0);
            transition: transform 0.1s ease-out;
        }

        .glass-panel {
            background: rgba(18, 21, 28, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .shiny-cta {
            position: relative;
            overflow: hidden;
            border-radius: 0.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2.5rem;
            font-size: 0.75rem;
        }
        .shiny-cta:hover { 
            background: #ffffff;
            color: #0a0c10;
            transform: translateY(-2px);
        }

        .text-gradient-white {
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #root { position: relative; z-index: 10; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
</head>
  <body>
    <div class="parallax-bg" id="parallaxBg"></div>
    <div id="root"></div>
    <script>
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const bg = document.getElementById('parallaxBg');
            bg.style.transform = `translateY(${scrolled * 0.3}px)`;
        });
    </script>
  </body>
</html>
