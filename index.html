    <style>
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }
        
        html, body {
            transition: background-color 0.4s ease, color 0.4s ease;
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: var(--font-sans);
            background-color: #14171d;
            color: #faf9f6;
            min-height: 100vh;
            position: relative;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        body.light {
            background-color: #faf9f6;
            color: #1a1c23;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2b87d66; border-radius: 10px; }

        .glass-panel {
            background: rgba(22, 25, 32, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(250, 249, 246, 0.1);
        }

        body.light .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 12px 40px -10px rgba(0,0,0,0.05);
        }

        .shiny-cta {
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #faf9f6;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1.2rem;
            font-size: 0.65rem;
        }

        @media (min-width: 640px) {
            .shiny-cta {
                letter-spacing: 0.2em;
                padding: 1rem 1.8rem;
                font-size: 0.7rem;
            }
        }

        body.light .shiny-cta {
            background: #1a1c23;
            color: #ffffff;
            border: none;
        }

        .shiny-cta:hover { 
            background: #e2b87d;
            color: #0d0f14;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(226, 184, 125, 0.3);
        }

        .text-gradient-white {
            background: linear-gradient(135deg, #ffffff 0%, #e2b87d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.light .text-gradient-white {
            background: linear-gradient(135deg, #1a1c23 0%, #8c6239 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes banner-flash {
            0%, 100% { background-color: #e2b87d; }
            50% { background-color: #faf9f6; }
        }
        .banner-flash-animation {
            animation: banner-flash 8s ease-in-out infinite;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
