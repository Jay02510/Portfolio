
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jason Benjamin | Educational Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            colors: {
              alpine: {
                950: '#0d0f14', 
                900: '#161920',
                800: '#232834',
                50: '#faf9f6' 
              },
              accent: {
                gold: '#e2b87d',
                clay: '#a87c5c'
              }
            }
          },
        },
      }
    </script>
    <style>
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }
        body {
            font-family: var(--font-sans);
            background-color: #0d0f14;
            color: #faf9f6;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0d0f14; }
        ::-webkit-scrollbar-thumb { background: #232834; border-radius: 10px; }

        .parallax-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 130%;
            z-index: -2;
            background-image: linear-gradient(to bottom, rgba(13, 15, 20, 0.7), rgba(13, 15, 20, 0.98)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2560&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
        }

        .glass-panel {
            background: rgba(22, 25, 32, 0.4);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(250, 249, 246, 0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .shiny-cta {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: #faf9f6;
            background: rgba(250, 249, 246, 0.02);
            border: 1px solid rgba(250, 249, 246, 0.08);
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 3.5rem;
            font-size: 0.65rem;
        }
        .shiny-cta:hover { 
            background: #faf9f6;
            color: #0d0f14;
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .text-gradient-white {
            background: linear-gradient(to bottom, #faf9f6 0%, #a87c5c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lab-blueprint-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(226, 184, 125, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        #root { position: relative; z-index: 10; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 8s ease-in-out infinite; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
</head>
  <body>
    <div class="parallax-bg" id="parallaxBg"></div>
    <div id="root"></div>
    <script>
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const bg = document.getElementById('parallaxBg');
            bg.style.transform = `translateY(${scrolled * 0.15}px)`;
        });
    </script>
  </body>
</html>
