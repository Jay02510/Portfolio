      window.process = window.process || { env: {} };
      if (typeof process !== 'undefined' && !process.env.API_KEY) {
        console.warn("In-app browser environment stability ensured.");
      }
      
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            colors: {
              alpine: {
                950: '#14171d', 
                900: '#181c24',

                200: '#e5e7eb',
                100: '#f3f4f6',

              },

              accent: {

              }
            },
          },
        },
      }
    </script>
    <style>
        :root {
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }
        
        html, body {
            transition: background-color 0.4s ease, color 0.4s ease;
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: var(--font-sans);
            background-color: #14171d;
            color: #faf9f6;
            min-height: 100vh;
            position: relative;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        body.light {
            background-color: #faf9f6;
            color: #1a1c23;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2b87d66; border-radius: 10px; }

        .glass-panel {
            background: #121418; /* Solid deep charcoal canvas tone */
            border: 1px solid rgba(250, 249, 246, 0.08);
        }

        body.light .glass-panel {
            background: #ffffff; /* Solid white canvas tone */
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 12px 40px -10px rgba(0,0,0,0.05);
        }

        .shiny-cta {
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #faf9f6;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1.2rem;
            font-size: 0.65rem;
        }

        @media (min-width: 640px) {
            .shiny-cta {
                letter-spacing: 0.2em;
                padding: 1rem 1.8rem;
                font-size: 0.7rem;
            }
        }

        body.light .shiny-cta {
            background: #1a1c23;
            color: #ffffff;
            border: none;
        }

        .shiny-cta:hover { 
            background: #e2b87d;
            color: #0d0f14;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(226, 184, 125, 0.3);
        }



        @keyframes banner-flash {
            0%, 100% { background-color: #e2b87d; }
            50% { background-color: #faf9f6; }
        }
        .banner-flash-animation {
            animation: banner-flash 8s ease-in-out infinite;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        @media print {
            html, body {
                background-color: white !important;
                background-image: none !important;
                color: #111827 !important;
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
            }

            /* Hide everything inside the React container except the resume modal overlay */
            #root > div > *:not(#resume-modal-overlay) {
                display: none !important;
            }

            /* Ensure the modal overlay spans the full page/canvas during print */
            #resume-modal-overlay {
                position: static !important;
                display: block !important;
                background: white !important;
                backdrop-filter: none !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
                z-index: auto !important;
            }

            /* Format the card container inside the modal to render beautifully as a plain document */
            #resume-modal-overlay > div {
                max-width: 100% !important;
                max-height: none !important;
                height: auto !important;
                border: none !important;
                box-shadow: none !important;
                background: white !important;
                color: #111827 !important;
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
            }

            /* Hide buttons, navigations, sidebars, other interactive controls */
            .print\:hidden,
            button,
            nav,
            header,
            .modal-close-btn {
                display: none !important;
            }

            /* Force all text elements to have clean print-friendly color */
            #resume-modal-overlay h1,
            #resume-modal-overlay h2,
            #resume-modal-overlay h3,
            #resume-modal-overlay h4,
            #resume-modal-overlay h5,
            #resume-modal-overlay h6 {
                color: #000000 !important;
                font-weight: 800 !important;
            }

            #resume-modal-overlay p,
            #resume-modal-overlay li,
            #resume-modal-overlay span,
            #resume-modal-overlay div {
                color: #222222 !important;
            }

            /* Style links beautifully */
            #resume-modal-overlay a {
                color: #111827 !important;
                text-decoration: underline !important;
            }

            /* Adapt golden accent colors to elegant print contrast (deep bronze/clay) */
            .text-accent-gold,
            #resume-modal-overlay .text-accent-gold {
                color: #724c24 !important; /* Richer, darker bronze for print contrast */
            }
            
            .border-accent-gold\/20,
            #resume-modal-overlay .border-accent-gold\/20 {
                border-color: rgba(114, 76, 36, 0.25) !important;
            }

            /* Keep experience borders visible but clean gray */
            .border-l,
            #resume-modal-overlay .border-l {
                border-left-color: rgba(0, 0, 0, 0.18) !important;
                border-left-width: 1.5px !important;
            }

            /* Stripping off the dark/colored background styles for clean print on pure white paper */
            #resume-modal-overlay div[class*="bg-"] {
                background: transparent !important;
                border-color: rgba(0, 0, 0, 0.1) !important;
                box-shadow: none !important;
            }

            /* Override product cards background and layout specifically */
            #resume-modal-overlay .space-y-4 > div[class*="bg-"] {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                padding: 4px 0 !important;
                margin-bottom: 12px !important;
                opacity: 1 !important;
            }

            /* Style the core competency tag capsules so they are extremely crisp and readable */
            #resume-modal-overlay span[class*="px-2"][class*="py-0.5"] {
                background-color: #f1f5f9 !important; /* Very soft gray capsule */
                border: 1px solid #cbd5e1 !important;
                color: #1e293b !important; /* Readable dark grey text */
                padding: 1px 6px !important;
                margin-top: 2px !important;
                margin-bottom: 2px !important;
                border-radius: 4px !important;
                display: inline-block !important;
                font-weight: 500 !important;
            }

            /* Ensure bullets have consistent padding and indent */
            #resume-modal-overlay ul {
                list-style-type: disc !important;
                padding-left: 16px !important;
            }
            #resume-modal-overlay li {
                display: list-item !important;
                margin-bottom: 4px !important;
                padding-left: 4px !important;
                text-indent: 0 !important;
            }

            /* Prevent awkward page breaks inside core modules */
            .print-avoid-break,
            #resume-modal-overlay .space-y-4 > div,
            #resume-modal-overlay .space-y-5 > div,
            #resume-modal-overlay .space-y-2 {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            /* Set perfect margins for standard A4/Letter prints */
            @page {
                size: portrait;
                margin: 15mm 15mm 15mm 15mm;
            }
        }
    </style>
